openapi: "3.0.0"
info:
  version: 1.0.0
  title: Personal Accounting REST API

paths:
  /api/livez:
    get:
      description: liveness check - checks if process is deadlocked
      responses:
        "200":
          description: process is running fine
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: ""

  /api/readyz:
    get:
      description: readiness check - checks if process can handle traffic (also considers downstream dependencies)
      responses:
        "200":
          description: process is running fine
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: ""

  /api/v1/accounting/ledger_accounts:
    get:
      tags: [accounting]
      summary: List all ledger accounts
      responses:
        "200":
          description: 200 OK - Success Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LedgerAccount"

  # TODO: add filter for BETWEEN dates and BY account_id
  /api/v1/accounting/postings:
    get:
      tags: [accounting]
      summary: List all postings
      responses:
        "200":
          description: 200 OK - Success Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Posting"

  # TODO: add filters for IN posting_ids (comma separated)
  /api/v1/accounting/entries:
    get:
      operationId: getEntries
      tags: [accounting]
      summary: List all entries
      responses:
        "200":
          description: 200 OK - Success Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Entry"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: CreateEntry
      tags: [accounting]
      summary: create entry
      requestBody:
        description: create entry
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - description
                - system_notes
                - ledger_accounts_id
                - postings_id
                - debit_amount
                - credit_amount
              properties:
                description: { type: string }
                system_notes: { type: string }
                ledger_accounts_id: { type: string }
                postings_id: { type: string }
                debit_amount: { type: string, format: decimal }
                credit_amount: { type: string, format: decimal }
      responses:
        "201":
          description: 201 Created - Success Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/accounting/entries/{entry_id}:
    put:
      operationId: UpdateEntry
      tags: [accounting]
      summary: replace of a ledger entry
      parameters:
        - name: entry_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: "replace entry object with new values"
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Entry"
      responses:
        "200":
          description: Entry updated successfully
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Entry not found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server Side Error
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: DeleteEntry
      tags: [accounting]
      summary: delete ledger entry
      parameters:
        - name: entry_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entry updated successfully
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Entry not found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server Side Error
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ErrorResponse"

  /api/v1/accounting/reports/account_balances:
    get:
      operationId: getAccountBalances
      tags: [accounting]
      summary: Get account balances and tree roll-ups for a date range
      description: Returns the full chart of accounts with individual and aggregated (rolled-up) debit/credit totals for the specified period.
      parameters:
        - name: start_date
          in: query
          required: true
          schema: { type: string, format: date }
          example: "2024-01-01"
        - name: end_date
          in: query
          required: true
          schema: { type: string, format: date }
          example: "2024-01-31"
      responses:
        "200":
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AccountBalanceNode"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    LedgerAccount:
      type: object
      description: Double-entry accounting charter of accounts
      required:
        - id
        - name
        - qualified_name
        - description
        - parent_id
      properties:
        id: { type: string }
        name: { type: string }
        qualified_name: { type: string }
        description: { type: string }
        parent_id:
          type: string
          nullable: true

    Posting:
      type: object
      description: Double-entry accounting ledger posting (journal entry)
      required:
        - id
        - transacted_at
        - description
        - system_notes
      properties:
        id: { type: string }
        transacted_at: { type: string, format: date }
        description: { type: string }
        system_notes: { type: string }

    Entry:
      type: object
      description: Double-entry accounting ledger entry
      required:
        - id
        - description
        - system_notes
        - ledger_accounts_id
        - postings_id
        - debit_amount
        - credit_amount
      properties:
        id: { type: string }
        description: { type: string }
        system_notes: { type: string }
        ledger_accounts_id: { type: string }
        postings_id: { type: string }
        debit_amount: { type: string }
        credit_amount: { type: string }

    AccountBalanceNode:
      type: object
      required:
        - ledger_account_id
        - parent_id
        - name
        - debit
        - credit
        - total_debit
        - total_credit
      properties:
        ledger_account_id: { type: string }
        parent_id: {type: string, nullable: true }
        name: { type: string }
        debit: { type: string, format: decimal }
        credit: { type: string, format: decimal }
        total_debit: { type: string, format: decimal }
        total_credit: { type: string, format: decimal }

    AccountStatus:
      type: object
      properties:
        account_id: { type: string, format: uuid }
        account_name: { type: string }
        balance: { type: integer }
        is_balanced:
          type: boolean
          description: "False if the sum of all transaction legs for this account is inconsistent"
        warnings:
          type: array
          items: { type: string }
          example:
            ["Uncategorized offset detected", "Transaction #452 is unbalanced"]

    ErrorResponse: # RFC9457 (loosely)
      type: object
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          description: A URI reference that identifies the problem type.
        title:
          type: string
          format: string
          description: A short, human-readable summary of the problem
        status:
          type: string
          format: integer
          description: The HTTP status code generated for this occurrence.
        detail:
          type: string
          format: string
          description: A human-readable explanation specific to this occurence.
        instance:
          type: string
          format: uri
          description: A URI reference for this specific occurence (e.g. trace ID)
